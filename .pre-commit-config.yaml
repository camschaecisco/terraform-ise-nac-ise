# Pre-commit configuration for ISE Terraform Module
# Following IOS-XE development workflow standards

repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.81.0
    hooks:
      - id: terraform_fmt
        name: Terraform Format
        description: Formats Terraform configuration files
      - id: terraform_validate
        name: Terraform Validate
        description: Validates Terraform configuration syntax
      - id: terraform_docs
        name: Terraform Docs
        description: Auto-generates documentation from terraform files
        args:
          - --args=--config=.terraform-docs.yml
      - id: terraform_tflint
        name: TFLint
        description: Lints Terraform configuration for best practices
        args:
          - --args=--config=.tflint.hcl

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
      - id: end-of-file-fixer
        name: Fix End of Files
      - id: check-yaml
        name: Check YAML
      - id: check-json
        name: Check JSON
      - id: check-added-large-files
        name: Check for Large Files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
        name: Check for Merge Conflicts

  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.12
    hooks:
      - id: tflint
        name: TFLint Extended
        description: Extended TFLint checks

  - repo: local
    hooks:
      - id: validate-nesting-levels
        name: Validate Nesting Levels
        entry: python scripts/validate_nesting.py
        language: python
        files: '\.(tf|yaml)$'
        pass_filenames: true
        additional_dependencies: [pyyaml]
