# Default values for ISE NAC configuration
defaults:
  ise:
    network_access:
      policy_sets:
        state: "enabled"
        default: false
        rank: 0
        is_proxy: false
        service_name: "Default Network Access"
        condition:
          type: "ConditionAndBlock"
          is_negate: false
          attribute_name: ""
          attribute_value: ""
          operator: "equals"
      authentication_rules:
        state: "enabled"
        default: false
        rank: 0
        identity_source_name: "Internal Users"
        if_auth_fail: "REJECT"
        if_process_fail: "DROP"
        if_user_not_found: "REJECT"
      authorization_rules:
        state: "enabled"
        default: false
        rank: 0
        profile_names: ["PermitAccess"]
    device_administration:
      policy_sets:
        state: "enabled"
        default: false
        rank: 0
        is_proxy: false
        service_name: "Default Device Admin"
        condition:
          type: "ConditionAndBlock"
          is_negate: false
          attribute_name: ""
          attribute_value: ""
          operator: "equals"
      authentication_rules:
        state: "enabled"
        default: false
        rank: 0
        identity_source_name: "Internal Users"
        if_auth_fail: "REJECT"
        if_process_fail: "DROP"
        if_user_not_found: "REJECT"
      authorization_rules:
        state: "enabled"
        default: false
        rank: 0
        profile_names: ["PermitAccess"]
